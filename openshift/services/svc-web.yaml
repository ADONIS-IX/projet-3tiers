---
# Service HA: distribue le trafic entre VM2 et le Pod fallback via le label role=web
apiVersion: v1
kind: Service
metadata:
  name: web-service-ha
  namespace: ad-gomis-dev
  labels:
    app: ad-gomis-dev
    role: web
spec:
  type: ClusterIP
  selector:
    role: web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Pod fallback (ne consomme pas de quota VM et maintient une reponse HTTP)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-fallback
  namespace: ad-gomis-dev
  labels:
    app: ad-gomis-dev
    role: web
spec:
  replicas: 1
  selector:
    matchLabels:
      role: web
      tier: fallback
  template:
    metadata:
      labels:
        app: ad-gomis-dev
        role: web
        tier: fallback
    spec:
      containers:
        - name: nginx-fallback
          image: nginxinc/nginx-unprivileged:alpine
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /tmp/www/api
              printf '{"status":"ok","service":"pod-fallback"}' > /tmp/www/health
              printf '{"status":"OK","data":{"nom":"ADONIS-IX","identifiant":"ad-gomis","email":"adonis@example.com","role":"Etudiant","projet":"TP Architecture 3-tiers","date":"31 mars 2026"}}' > /tmp/www/api/profile
              printf '[]' > /tmp/www/api/users
              cat > /tmp/www/index.html <<'HTML'
              <!doctype html><meta charset="utf-8"><title>Page d'accueil</title>
              <meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#f7f2e7,#e7f2f0);font:15px system-ui;color:#1f2a2f}.c{width:min(860px,92vw);background:#fffc;border:1px solid #d8dfdf;border-radius:16px;padding:16px;box-shadow:0 12px 28px #0001}h1{margin:0}.m{margin:.35rem 0 1rem;color:#5f6f77}.b{background:#eb5e28;color:#fff;border:0;border-radius:9px;padding:8px 12px;font-weight:700}.g{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.k{background:#fff;border:1px solid #d8dfdf;border-radius:10px;padding:8px}.k b{display:block;font-size:11px;color:#5f6f77;text-transform:uppercase}@media(max-width:700px){.g{grid-template-columns:1fr}}</style>
              <body><main class=c><h1>Bienvenue</h1><p class=m>Accueil du service web 3-tiers</p><button id=r class=b>Actualiser</button><h3>Profil</h3><div id=p class=g></div><h3>Sante</h3><div id=h class=g></div></main></body>
              <script>const J=s=>{try{return JSON.parse(s)}catch{return{raw:s}}},V=o=>{const a=Object.entries(o||{});return a.length?a.map(([k,v])=>`<div class=k><b>${k}</b>${v??'-'}</div>`).join(''):'<div class=k><b>info</b>Aucun attribut</div>'};async function L(){const[ps,hs]=await Promise.all([fetch('/api/profile').then(r=>r.text()),fetch('/health').then(r=>r.text())]);const p=J(ps),h=J(hs);document.getElementById('p').innerHTML=V(p.data||p);document.getElementById('h').innerHTML=V(h)}r.onclick=L;L();</script>
              HTML

              cat > /tmp/nginx.conf <<'EOF'
              worker_processes auto;
              pid /tmp/nginx.pid;

              events {
                worker_connections 1024;
              }

              http {
                client_body_temp_path /tmp/client_temp;
                proxy_temp_path /tmp/proxy_temp;
                fastcgi_temp_path /tmp/fastcgi_temp;
                uwsgi_temp_path /tmp/uwsgi_temp;
                scgi_temp_path /tmp/scgi_temp;

                server {
                  listen 8080;
                  root /tmp/www;

                  location / {
                    try_files $uri /index.html;
                  }
                }
              }
              EOF
              nginx -g 'daemon off;' -c /tmp/nginx.conf
          ports:
            - containerPort: 8080
---
# Route OpenShift vers le service HA
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: route-web
  namespace: ad-gomis-dev
  labels:
    app: ad-gomis-dev
    role: web
spec:
  to:
    kind: Service
    name: web-service-ha
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
