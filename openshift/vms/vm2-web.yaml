apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: ad-gomis-dev
  labels:
    role: web
    app: ad-gomis-dev
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm2-web
        role: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 768Mi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: ubuntu
              no_ssh_fingerprints: true
              runcmd:
                - mkdir -p /opt/www/api
                - printf '{"status":"ok","service":"vm2-web-containerdisk"}' > /opt/www/health
                - printf '{"status":"OK","data":{"nom":"ADONIS-IX","identifiant":"ad-gomis","email":"adonis@example.com","role":"Etudiant","projet":"TP Architecture 3-tiers","date":"31 mars 2026"}}' > /opt/www/api/profile
                - printf '[]' > /opt/www/api/users
                - |
                  cat > /opt/www/index.html <<'HTML'
                  <!doctype html><meta charset="utf-8"><title>Page d'accueil</title>
                  <meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#f7f2e7,#e7f2f0);font:15px system-ui;color:#1f2a2f}.c{width:min(860px,92vw);background:#fffc;border:1px solid #d8dfdf;border-radius:16px;padding:16px;box-shadow:0 12px 28px #0001}h1{margin:0}.m{margin:.35rem 0 1rem;color:#5f6f77}.b{background:#eb5e28;color:#fff;border:0;border-radius:9px;padding:8px 12px;font-weight:700}.g{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.k{background:#fff;border:1px solid #d8dfdf;border-radius:10px;padding:8px}.k b{display:block;font-size:11px;color:#5f6f77;text-transform:uppercase}@media(max-width:700px){.g{grid-template-columns:1fr}}</style>
                  <body><main class=c><h1>Bienvenue</h1><p class=m>Accueil du service web 3-tiers</p><button id=r class=b>Actualiser</button><h3>Profil</h3><div id=p class=g></div><h3>Sante</h3><div id=h class=g></div></main></body>
                  <script>const J=s=>{try{return JSON.parse(s)}catch{return{raw:s}}},V=o=>{const a=Object.entries(o||{});return a.length?a.map(([k,v])=>`<div class=k><b>${k}</b>${v??'-'}</div>`).join(''):'<div class=k><b>info</b>Aucun attribut</div>'};async function L(){const[ps,hs]=await Promise.all([fetch('/api/profile').then(r=>r.text()),fetch('/health').then(r=>r.text())]);const p=J(ps),h=J(hs);document.getElementById('p').innerHTML=V(p.data||p);document.getElementById('h').innerHTML=V(h)}r.onclick=L;L();</script>
                  HTML
                - nohup python3 -m http.server 8080 --directory /opt/www >/var/log/tp3-web.log 2>&1 &
