apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: ad-gomis-dev
  labels:
    role: web
    app: ad-gomis-dev
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm2-web
        role: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 768Mi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: ubuntu
              no_ssh_fingerprints: true
              runcmd:
                - mkdir -p /opt/www/api
                - printf '{"status":"ok","service":"vm2-web-containerdisk"}' > /opt/www/health
                - printf '{"status":"OK","data":{"nom":"ADONIS-IX","identifiant":"ad-gomis","email":"adonis@example.com","role":"Etudiant","projet":"TP Architecture 3-tiers","date":"31 mars 2026"}}' > /opt/www/api/profile
                - |
                  cat > /opt/www/index.html <<'HTML'
                  <!doctype html><meta charset="utf-8"><title>Mes informations</title>
                  <h1>Mes informations (VM2)</h1><button id="r">Rafraichir</button><h2>Profil</h2><pre id="p"></pre><h2>Sante</h2><pre id="h"></pre>
                  <script>function l(){Promise.all([fetch('/api/profile').then(r=>r.text()),fetch('/health').then(r=>r.text())]).then(([p,h])=>{document.getElementById('p').textContent=p;document.getElementById('h').textContent=h;});}document.getElementById('r').onclick=l;l();</script>
                  HTML
                - nohup python3 -m http.server 8080 --directory /opt/www >/var/log/tp3-web.log 2>&1 &
