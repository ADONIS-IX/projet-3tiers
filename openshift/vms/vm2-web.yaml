apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: ad-gomis-dev
  labels:
    role: web
    app: ad-gomis-dev
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm2-web
        role: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: ubuntu
              no_ssh_fingerprints: true
              runcmd:
                - mkdir -p /opt/www/api
                - printf '{"status":"ok","service":"vm2-web-containerdisk"}' > /opt/www/health
                - printf '[]' > /opt/www/api/users
                - nohup python3 -m http.server 8080 --directory /opt/www >/var/log/tp3-web.log 2>&1 &
