apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: ad-gomis-dev
  labels:
    role: web
    app: ad-gomis-dev
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm2-web
        role: web
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: quay.io/containerdisks/ubuntu:22.04
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: ubuntu
              no_ssh_fingerprints: true
              package_update: true
              packages:
                - nginx
              write_files:
                - path: /etc/nginx/sites-available/tp-3tiers
                  permissions: "0644"
                  content: |
                    server {
                        listen 8080;
                        server_name _;

                        location = /health {
                            default_type application/json;
                            return 200 '{"status":"ok","service":"vm2-web-persistante"}';
                        }

                        location = /api/users {
                            default_type application/json;
                            return 200 '[]';
                        }

                        location / {
                            return 404;
                        }
                    }
              runcmd:
                - ln -sf /etc/nginx/sites-available/tp-3tiers /etc/nginx/sites-enabled/tp-3tiers
                - rm -f /etc/nginx/sites-enabled/default
                - nginx -t
                - systemctl enable --now nginx
